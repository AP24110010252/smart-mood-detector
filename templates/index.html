<!DOCTYPE html>
<html>

<head>

<title>Smart Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

h1{
font-size:45px;
margin-top:30px;
}

video{
width:90%;
max-width:700px;
border:5px solid aqua;
border-radius:20px;
}

#status{
font-size:30px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline
muted>
</video>

<p id="status">
Loading...
</p>

<script>

let video =
document.getElementById("camera")

navigator.mediaDevices
.getUserMedia({
video:true
})

.then((stream)=>{

video.srcObject=stream

document
.getElementById("status")
.innerHTML=
"Camera Connected ✅"

})

.catch((e)=>{

document
.getElementById("status")
.innerHTML=
"Allow Camera Permission"

})

</script>

</body>

</html>
