<script>

navigator.mediaDevices
.getUserMedia({
video:true
})

.then(function(stream){

document
.getElementById("camera")
.srcObject = stream

document
.getElementById("mood")
.innerHTML =
"Camera Connected ✅"

})

.catch(function(error){

document
.getElementById("mood")
.innerHTML =
"Camera Permission Denied ❌"

})

</script>
