<script>

const moods = [
"😊 Happy",
"😐 Neutral",
"😴 Sleepy",
"😢 Sad"
]

navigator
.mediaDevices
.getUserMedia({
video:true
})

.then(function(stream){

document
.getElementById(
"camera"
)
.srcObject=
stream

document
.getElementById(
"mood"
)
.innerHTML=
"Face Found 😊"

})

.catch(function(){

document
.getElementById(
"mood"
)
.innerHTML=
"No Camera"

})

</script>
