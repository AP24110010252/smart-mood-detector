<!DOCTYPE html>
<html>

<head>

<title>Smart Mood Detector</title>

<style>

body{
background:black;
text-align:center;
}

h1{
color:aqua;
font-size:50px;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
color:aqua;
font-size:35px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<p id="mood">
😊 Happy
</p>

<script>

navigator
.mediaDevices
.getUserMedia({
video:true
})

.then(function(stream){

document
.getElementById("camera")
.srcObject=
stream

let moods=[
"😊 Happy",
"😐 Neutral",
"😢 Sad",
"😴 Sleepy"
]

setInterval(function(){

let random=
Math.floor(
Math.random()*4
)

document
.getElementById(
"mood"
).innerHTML=
moods[random]

},3000)

})

.catch(function(){

document
.getElementById(
"mood"
).innerHTML=
"Camera Error"

})

</script>

</body>

</html>
