<!DOCTYPE html>
<html>

<head>

<title>Real Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Detecting Real Emotion...
</h2>

<script>

navigator
.mediaDevices
.getUserMedia({
video:true
})

.then((stream)=>{

document
.getElementById(
"camera"
)
.srcObject=stream

document
.getElementById(
"mood"
)
.innerHTML=
"Face Ready ✅"

})

.catch(()=>{

document
.getElementById(
"mood"
)
.innerHTML=
"Camera Permission Denied ❌"

})

</script>

</body>

</html>
