<!DOCTYPE html>
<html>

<head>

<title>Smart AI Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

h1{
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

<script src="https://unpkg.com/face-api.js"></script>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Opening Camera...
</h2>

<script>

const video =
document.getElementById("camera")

const mood =
document.getElementById("mood")

async function start(){

try{

const stream=
await navigator
.mediaDevices
.getUserMedia({
video:true
})

video.srcObject=
stream

video.onloadedmetadata=
async()=>{

mood.innerHTML=
"Loading AI..."

await Promise.all([

faceapi.nets
.tinyFaceDetector
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
),

faceapi.nets
.faceExpressionNet
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
)

])

mood.innerHTML=
"AI Ready 🤖"

setInterval(
detectMood,
3000
)

}

}

catch(error){

mood.innerHTML=
"Camera Error ❌"

console.log(error)

}

}

async function detectMood(){

const result=

await faceapi
.detectSingleFace(
video,
new faceapi
.TinyFaceDetectorOptions()
)
.withFaceExpressions()

if(result){

let emotion=

Object.keys(
result.expressions
).reduce(
(a,b)=>
result.expressions[a]>
result.expressions[b]
?
a
:
b
)

mood.innerHTML=
"😊 "+emotion

}
else{

mood.innerHTML=
"No Face Detected"

}

}

start()

</script>

</body>

</html>
