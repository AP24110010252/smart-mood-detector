<!DOCTYPE html>
<html>

<head>

<title>Real AI Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Loading AI...
</h2>

<script>

const video =
document.getElementById(
"camera"
)

Promise.all([

faceapi
.nets
.tinyFaceDetector
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
),

faceapi
.nets
.faceExpressionNet
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
)

])

.then(start)

function start(){

navigator
.mediaDevices
.getUserMedia({
video:true
})

.then((stream)=>{

video.srcObject=
stream

})

}

video
.addEventListener(
"play",

()=>{

setInterval(
async()=>{

const result=

await faceapi
.detectSingleFace(
video,
new faceapi
.TinyFaceDetectorOptions()
)

.withFaceExpressions()

if(result){

let mood=

Object
.entries(
result
.expressions
)

.sort(
(a,b)=>
b[1]-a[1]
)[0][0]

document
.getElementById(
"mood"
)
.innerHTML=
"😊 "+mood

}

else{

document
.getElementById(
"mood"
)
.innerHTML=
"Show Face"

}

},

1500

)

}

)

</script>

</body>

</html>
