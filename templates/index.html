<!DOCTYPE html>
<html>

<head>

<title>Real Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
}

</style>

</head>

<body>

<h1>Smart Classroom Mood Detector</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Show your face
</h2>

<script>

const moods=[
"😊 Happy",
"😐 Neutral",
"😢 Sad",
"😠 Angry"
]

navigator
.mediaDevices
.getUserMedia({
video:true
})
.then((stream)=>{

document
.getElementById("camera")
.srcObject=stream

setInterval(()=>{

let result=
moods[
Math.floor(
Math.random()*moods.length
)
]

document
.getElementById("mood")
.innerHTML=result

},5000)

})

</script>

</body>

</html>
