<!DOCTYPE html>
<html>

<head>

<title>Smart Classroom Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

h1{
font-size:45px;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Detecting...
</h2>

<script>

const video =
document.getElementById("camera")

const mood =
document.getElementById("mood")

navigator.mediaDevices
.getUserMedia({
video:true
})

.then(stream=>{

video.srcObject=
stream

setInterval(()=>{

let moods=[
"😊 Happy",
"😐 Neutral",
"😴 Sleepy",
"😎 Active"
]

mood.innerHTML=
moods[
Math.floor(
Math.random()*4
)
]

},3000)

})

.catch(()=>{

mood.innerHTML=
"Camera Permission Denied"

})

</script>

</body>

</html>
