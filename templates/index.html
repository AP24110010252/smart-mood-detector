<!DOCTYPE html>
<html>

<head>

<title>Smart Mood Detector</title>

<style>

body{
background:black;
text-align:center;
}

h1{
color:aqua;
font-size:50px;
margin-top:30px;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
margin-top:30px;
}

#mood{
color:aqua;
font-size:30px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Smart Classroom Mood Detector</h1>

<video id="camera" autoplay playsinline></video>

<p id="mood">Loading...</p>

<script>

const video =
document.getElementById("camera")

const mood =
document.getElementById("mood")

navigator.mediaDevices
.getUserMedia({
video:true
})

.then((stream)=>{

video.srcObject =
stream

mood.innerHTML =
"Camera Connected ✅"

})

.catch(()=>{

mood.innerHTML =
"Allow Camera Permission ❌"

})

</script>

</body>

</html>
