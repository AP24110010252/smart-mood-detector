<!DOCTYPE html>
<html>

<head>

<title>Real AI Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

</head>

<body>

<h1>Smart Classroom Mood Detector</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Loading AI...
</h2>

<script>

const video =
document.getElementById(
"camera"
)

async function start(){

document
.getElementById(
"mood"
)
.innerHTML=
"Opening Camera..."

try{

const stream=
await navigator
.mediaDevices
.getUserMedia({
video:true
})

video.srcObject=
stream

document
.getElementById(
"mood"
)
.innerHTML=
"Camera Connected ✅"

}

catch{

document
.getElementById(
"mood"
)
.innerHTML=
"Camera Failed ❌"

}

}

start()

</script>

</body>

</html>
