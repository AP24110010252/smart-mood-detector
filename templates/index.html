<!DOCTYPE html>
<html>

<head>

<title>Smart AI Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Opening Camera...
</h2>

<script>

const video =
document.getElementById("camera")

const mood =
document.getElementById("mood")

async function start(){

try{

const stream =
await navigator
.mediaDevices
.getUserMedia({

video:{
facingMode:"user"
}

})

video.srcObject =
stream

setInterval(()=>{

if(video.readyState===4){

mood.innerHTML =
"😊 Neutral"

}

},2000)

}

catch{

mood.innerHTML =
"Camera Permission Denied ❌"

}

}

start()

</script>

</body>

</html>
