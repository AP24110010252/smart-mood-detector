<!DOCTYPE html>
<html>

<head>

<title>Smart AI Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

h1{
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Loading AI...
</h2>

<script>

const video =
document.getElementById("camera")

const mood =
document.getElementById("mood")

async function start(){

try{

const stream =
await navigator
.mediaDevices
.getUserMedia({

video:{
facingMode:"user"
}

})

video.srcObject=
stream

mood.innerHTML=
"Camera Connected ✅"

await Promise.all([

faceapi
.nets
.tinyFaceDetector
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
),

faceapi
.nets
.faceExpressionNet
.loadFromUri(
"https://justadudewhohacks.github.io/face-api.js/models"
)

])

mood.innerHTML=
"AI Ready 🤖"

setInterval(
detectMood,
3000
)

}

catch{

mood.innerHTML=
"Allow Camera Permission ❌"

}

}

async function detectMood(){

if(video.readyState!==4)
return

const result=
await faceapi
.detectSingleFace(
video,
new faceapi
.TinyFaceDetectorOptions()
)
.withFaceExpressions()

if(result){

let emotion=
Object.keys(
result.expressions
).reduce(

(a,b)=>

result
.expressions[a]
>

result
.expressions[b]

?

a

:

b

)

mood.innerHTML=
"😊 "+emotion

}

}

start()

</script>

</body>

</html>
