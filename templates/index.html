<!DOCTYPE html>
<html>

<head>

<title>Smart Classroom Mood Detector</title>

<style>

body{
background:black;
text-align:center;
color:aqua;
}

h1{
color:aqua;
}

video{
width:90%;
border:5px solid aqua;
border-radius:20px;
}

#mood{
font-size:35px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>
Smart Classroom Mood Detector
</h1>

<video
id="camera"
autoplay
playsinline>
</video>

<h2 id="mood">
Show Face 😊
</h2>

<script>

const video =
document.getElementById(
"camera"
)

const mood =
document.getElementById(
"mood"
)

async function startCamera(){

try{

const stream =
await navigator
.mediaDevices
.getUserMedia({

video:{
facingMode:"user"
}

})

video.srcObject =
stream

mood.innerHTML =
"Face Detected 😊"

}

catch{

mood.innerHTML =
"Allow Camera Permission ❌"

}

}

startCamera()

</script>

</body>

</html>
